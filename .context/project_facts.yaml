datastores:
  - name: Milvus
    role: vector store for semantic index/search
    source: observed # pkg/vectorstore/milvus.go
  - name: Ollama
    role: embedding provider via HTTP API
    source: observed # pkg/embedding/ollama.go
  - name: Local filesystem state (${CODESIGHT_STATE_DIR:-~/.codesight})
    role: LSP lifecycle state persistence
    source: observed # pkg/lsp/lifecycle.go

entrypoints:
  - type: CLI
    path: cmd/cs/main.go
    commands: [index, search, extract, refs, callers, implements, status, clear, config, init]
    source: observed
  - type: Integration script
    path: scripts/test-integration.sh
    source: observed

api_contract:
  stable_surface:
    value: CLI commands are the only intended stable public API surface.
    source: reported # QA answer
  pkg_api_stability:
    value: pkg/* is not treated as stable external API.
    source: reported # QA answer
  breaking_changes_policy:
    value: Breaking CLI changes are currently acceptable in early-stage development when task-scoped.
    source: reported # QA answer

constraints:
  do_not_touch_seed:
    value: []
    source: reported # seed facts had no do_not_touch values
  protected_paths:
    value:
      - docs/**
      - .prompts/**
      - specs/**
      - .github/workflows/release.yml
      - bin/**
    source: mixed # reported + observed
  conditional_paths:
    value:
      - agent-skills/** # editable only for explicitly scoped skill/tooling tasks
    source: reported

runtime_policy:
